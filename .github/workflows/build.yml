name: Build

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build
        run: pyinstaller --onefile --windowed --noconsole --name "PixiesetSelector" --icon Icon.ico pixieset_selector.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PixiesetSelector.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build
        run: pyinstaller --onefile --windowed --noconsole --name "PixiesetSelector" --icon Icon.icns pixieset_selector.py

      - name: Zip it
        run: zip -j dist/PixiesetSelector-mac.zip dist/PixiesetSelector

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PixiesetSelector-mac.zip